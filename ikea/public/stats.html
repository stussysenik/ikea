<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
      <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <title>Statistics</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300&display=swap" rel="stylesheet"/>
  </head>

  <body style="display: none;">
    <div id="loading"><img src="loader.gif" alt="loader" /></div>
    <div id="tiles" class="container">
      <div class="upper-section">
        <h1 id="title" class="my-4">Statistiky</h1>
        <button type="button" class="my-4">Exportovat</button>
      </div>
      <div id="line" style="height:10px; width:100%"></div>
      <div id="section" class="section">
        <div id="line-div" class="line-div"></div>
      </div>
    </div>
    <!-- Bootstrap links-->
    <script src="js/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/5.9.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/5.9.2/firebase-firestore.js"></script>
  </body>
</html>

<script>
  // Your web app's Firebase configuration
  var firebaseConfig = {
    apiKey: '***REMOVED_API_KEY***',
    authDomain: 'attendu-services.firebaseapp.com',
    databaseURL: 'https://attendu-services.firebaseio.com',
    projectId: 'attendu-services',
    storageBucket: 'attendu-services.appspot.com',
    messagingSenderId: '375245809683',
    appId: '1:375245809683:web:f87cdb413f3fc060'
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function getTeams() {
    var collRef = db
      .collection('ikea')
      .doc('teambuilding')
      .collection('teams');
    /* TEAMBUILDING DOC */
    db.collection('ikea')
      .doc('teambuilding')
      .get()
      .then(function(teambuildingDoc) {
        /* TEAMS COLLECTION */
        collRef.orderBy('total').onSnapshot(function(querySnapshot) {
          $('#tiles').show();
          document.getElementById('line-div').innerHTML = '';
          querySnapshot.forEach(function(teamDoc) {
            addTile(
              teamDoc.data().title,
              teamDoc.data().total,
              teambuildingDoc.data().stands.length -
                Object.keys(teamDoc.data().points).length
            );
          });
        });
      });
    // console.log(Object.keys(teambuildingDoc.data().stands).length);
    // console.log(Object.keys(doc.data().points).length);
  }
  function addTile(team, points, remaining) {
    let output = '<div class="px-2 py-2 tile">';
    output += '<div class="px-4 points">';
    output += '<h1 class="number">' + points + '</h1>';
    output +=
      '<div style="height: 100%">' + '<h4>' + 'pts' + '</h4>' + '</div>';
    output += '</div>';
    output += '<div class="px-2 description">';
    output += '<h3>' + team + '</h3>';
    output += '<p>' + 'Zbývající stanoviště: ' + remaining + '</p>';
    output += '</div>';
    output += '</div>';

    document.getElementById('line-div').innerHTML += output;
    return output;
  }

  function insertTiles() {
    $(document).ready(function() {
      setTimeout(() => {
        $('#loading').hide();
      }, 700);
      getTeams();
    });
  }

  if (window.location.pathname.endsWith('html')) {
    window.location = document.location.href.replace(
      /[^/]*$/.exec(document.location.href)[0],
      ''
    );
  }

  $(document).ready(function() {
    $('body').css('display', 'block');
    $('#tiles').hide();
    insertTiles();
  });
</script>
